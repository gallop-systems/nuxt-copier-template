name: Release Please

# release-please watches main, opens/updates a release PR (version bump in
# .release-please-manifest.json + CHANGELOG inferred from conventional commits).
# Merging that PR cuts a git tag (vX.Y.Z) + GitHub Release — the version protocol
# copier descendants track via `.copier-answers.yml` `_commit`.
#
# `release-type: simple` because this repo is a copier template, not an npm
# package: there's nothing to publish, only to tag + release. Renovate's
# `fix(deps):` commits (see renovate.json) therefore auto-cut a patch.
#
# Prereqs (one-time, in repo/org settings):
#   - Settings > Actions > General > "Allow GitHub Actions to create and approve
#     pull requests" (so release-please can open the release PR).

on:
  push:
    branches:
      - main

permissions:
  contents: write # create releases + tags
  pull-requests: write # open/update the release PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
