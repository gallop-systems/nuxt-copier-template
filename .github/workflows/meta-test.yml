name: Meta-Test

# Prove the template still produces a WORKING project. The expensive, repo-unique
# step — scaffolding from HEAD (copier render + yarn install + volt-vue add +
# migrate/seed) — runs ONCE in `scaffold` and is published as an artifact; the
# checks then fan out in parallel, each pulling that scaffold down. `meta-success`
# is the single stable gate to require in branch protection.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # The scaffold's first `yarn install` must CREATE the project's lockfile (the
  # freshly generated project has none yet). Two Yarn-4 CI defaults forbid that
  # and must be disabled: hardened mode (auto-on for public-PR CI) and immutable
  # installs (auto-on whenever $CI is set — which is why this only bites in CI,
  # not locally). Safe here: this is our own first-party template, and the
  # downstream jobs pass `--immutable` on the CLI (which overrides this env), so
  # they still validate the lockfile the scaffold produced.
  YARN_ENABLE_HARDENED_MODE: "0"
  YARN_ENABLE_IMMUTABLE_INSTALLS: "false"

jobs:
  scaffold:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # The scaffold's `.env` connection string is bare (`postgresql://localhost
      # /db`), so libpq fills user/host from these — pointing it at the trust-auth
      # service. createdb/dropdb in the _tasks honour them too.
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - name: Install uv (for uvx copier)
        uses: astral-sh/setup-uv@v8.2.0
      - name: Install postgresql-client (createdb/dropdb in the scaffold tasks)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Git identity (the scaffold tasks make an initial commit)
        run: |
          git config --global user.email "meta-test@gallop.invalid"
          git config --global user.name "Template Meta-Test"
      - name: Scaffold a project from HEAD
        run: |
          uvx copier copy --trust --defaults --vcs-ref HEAD \
            --data project_name="gallop-tpl-test" \
            --data project_description="Template test scaffold" \
            --data database_name="gallop_tpl_test" \
            --data include_google_oauth=false \
            --data include_ci=false \
            --data include_git_hooks=false \
            --data include_template_update_checker=false \
            . /tmp/scaffold
      - name: Package the scaffold for the check jobs (sans node_modules)
        # db.d.ts (codegen output) and the volt components ARE source → included,
        # so typecheck/build see them. node_modules/.nuxt are regenerated by the
        # downstream `yarn install` (postinstall runs `nuxt prepare`).
        run: tar --exclude=node_modules --exclude=.nuxt --exclude=.output --exclude=.git -C /tmp/scaffold -czf scaffold.tgz .
      - uses: actions/upload-artifact@v7
        with:
          name: scaffold
          path: scaffold.tgz
          retention-days: 1

  # No-DB checks, fanned out across one matrix.
  check:
    needs: scaffold
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: static, cmd: "yarn lint && yarn fmt:check" }
          - { name: typecheck, cmd: "yarn typecheck" }
          - { name: frontend, cmd: "yarn test:frontend:run" }
    name: check (${{ matrix.name }})
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - uses: actions/download-artifact@v8
        with:
          name: scaffold
      - run: mkdir scaffold && tar -C scaffold -xzf scaffold.tgz
      - working-directory: scaffold
        run: yarn install --immutable
      - working-directory: scaffold
        run: ${{ matrix.cmd }}
        env:
          NODE_OPTIONS: --experimental-strip-types --max-old-space-size=6144

  # Backend tests need a database; the transaction-rollback harness migrates the
  # schema into the service's DB on first connect.
  test:
    needs: scaffold
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: gallop_tpl_test-test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - uses: actions/download-artifact@v8
        with:
          name: scaffold
      - run: mkdir scaffold && tar -C scaffold -xzf scaffold.tgz
      - working-directory: scaffold
        run: yarn install --immutable
      - working-directory: scaffold
        run: yarn test:run
        env:
          TEST_POSTGRESQL_CONNECTION_STRING: postgres://postgres:postgres@localhost:5432/gallop_tpl_test-test
          NODE_OPTIONS: --experimental-strip-types

  # Production build + boot + page smoke (bin/smoke.sh). No DB: the smoked pages
  # don't query it, and the pool is lazy.
  build:
    needs: scaffold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7 # for bin/smoke.sh
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - uses: actions/download-artifact@v8
        with:
          name: scaffold
      - run: mkdir scaffold && tar -C scaffold -xzf scaffold.tgz
      - working-directory: scaffold
        run: yarn install --immutable
      - working-directory: scaffold
        run: yarn build
        env:
          NODE_OPTIONS: --experimental-strip-types --max-old-space-size=6144
      - name: Boot the production build and smoke-test pages
        working-directory: scaffold
        run: bash "$GITHUB_WORKSPACE/bin/smoke.sh"

  # Single stable gate to require in branch protection — passes only if every
  # job above did. Renovate auto-merges (e.g. the agent-skills bump) wait on this.
  meta-success:
    name: meta-success
    if: always()
    needs: [scaffold, check, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "job results: $results"
          for r in $results; do
            [ "$r" = "success" ] || { echo "✗ a required job failed or was skipped"; exit 1; }
          done
          echo "✓ all required jobs succeeded"
