_subdirectory: template
_templates_suffix: .jinja
_skip_if_exists:
  - ".env"

# Questions
project_name:
  type: str
  help: "Project name (used for package.json, DB names, etc.)"
  validator: "{% if not project_name %}project_name is required{% endif %}"

project_description:
  type: str
  help: "Project description for package.json"
  default: ""

database_name:
  type: str
  help: "PostgreSQL database name"
  default: "{{ project_name }}"

include_google_oauth:
  type: bool
  help: "Include Google OAuth config?"
  default: true

include_ci:
  type: bool
  help: "Include GitHub Actions CI workflow?"
  default: true

include_git_hooks:
  type: bool
  help: "Include lefthook git hooks?"
  default: true

include_template_update_checker:
  type: bool
  help: "Include workflow to check for template updates?"
  default: true

# Post-generation tasks
_tasks:
  # Create databases
  - command: "createdb {{ database_name }}"
    when: "{{ _copier_operation == 'copy' }}"
  - command: "createdb {{ database_name }}-test"
    when: "{{ _copier_operation == 'copy' }}"
  # Create .env from example
  - command: "cp .env.example .env"
    when: "{{ _copier_operation == 'copy' }}"
  # Install dependencies (skip builds to avoid nuxt prepare before env is ready)
  - command: "yarn install"
    when: "{{ _copier_operation == 'copy' }}"
  # Install Volt components
  - command: "npx volt-vue add Button SecondaryButton Card InputText Password Select Textarea Avatar Tag DataTable Dialog ConfirmDialog Message Toast"
    when: "{{ _copier_operation == 'copy' }}"
  # Create and populate users migration
  - command: "yarn db:migrate:make create_users_table"
    when: "{{ _copier_operation == 'copy' }}"
  - command: "node scripts/populate-initial-migration.mjs"
    when: "{{ _copier_operation == 'copy' }}"
  # Run migration and generate types
  - command: "bash -c 'set -a && source .env && set +a && yarn db:migrate'"
    when: "{{ _copier_operation == 'copy' }}"
  - command: "bash -c 'set -a && source .env && set +a && yarn db:codegen'"
    when: "{{ _copier_operation == 'copy' }}"
  # Initialize git repo (must come before lefthook install)
  - command: "git init && git add -A && git commit -m 'Initial scaffold from gallop-template'"
    when: "{{ _copier_operation == 'copy' }}"
  # Install lefthook (conditional, requires git repo)
  - command: "npx lefthook install"
    when: "{{ _copier_operation == 'copy' and include_git_hooks }}"
